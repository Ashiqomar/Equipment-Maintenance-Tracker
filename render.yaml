services:
  - type: web
    name: equipment-maintenance-tracker
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn asset_manager.wsgi:application"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: equipment-maintenance-db
          property: connectionString

databases:
  - name: equipment-maintenance-db
    plan: free
